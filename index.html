<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <title>Clicker Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    </head>

    <body>
        <div id="mainGame">
        <h1>🌲 Wood Clicker</h1>
        <h2 id="wood">Madera = 0</h2>
        <button id="recolectarButton">
            Recolectar Madera
        </button>
        <button id="upgradeButton">
            Mejorar hacha (10 de Madera)
        </button>

        <button id="workerButton">
            Contratar Leñador (25 de Madera)
        </button>

        <h2 id="stone">Piedra = 0</h2>

        <button id="mineButton">Minar Piedra</button>

        <button id="upgradePickaxe">Mejorar tu pico (10 de Piedra)</button>
        
        <button id="stoneWorker">Contratar Trabajador (25 de piedra)</button>
        
        <h2 id="iron">Hierro = 0</h2>

        <button id="mineIron">Minar Hierro</button>

        <button id="upgradeIron">Mejorar tu Taladro (25 de Hierro)</button>

        <button id="ironWorker">Contratar Minero (50 de Hierro)</button>



        <h1 id="tradeos">Zona de Tradeos: Cambia tu oro por recursos</h1>
        <h2 id="gold">Oro = 0</h2>
        <button id="tradeWood">5 de oro = 1000 de Madera</button>
        <button id="tradeStone">5 de oro = 1000 de piedra</button>
        <button id="tradeIron">8 de oro = 750 de Hierro</button>

        <button id="openGambling">Entrar a las Apuestas</button>
        <button id="reset">Reiniciar progreso</button>

        </div>

        <div id="gambling">
            <h1>🕯️ El Comerciante</h1>

            <input id="gambleInput" type="number" name="Cuanto quieres Apostar">
            <p id="gambleMessage"></p>
            <button id="gambleWood">
            Cuanta Madera quieres apostar?    
            </button>
            <button id="gambleStone">
                Cuanta piedra quieres apostar?
            </button>
            <button id="gambleIron">
                Cuanta Hierro queres apostar?
            </button>
            
            <button id="backButton">Volver al Clicker</button>
        </div>

        <script src="game.js"></script>
    </body>
</html>
